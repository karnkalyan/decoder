services:
  app:
    build: .
    restart: always
    environment:
      - DATABASE_URL=mysql://root:Decoder%21%40%23123XPrem%21um@db:3306/decodx_db
      - ADMIN_API_KEY=DecoDxPremiumDecoder@Alf@Key123
      - PORT=3100
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - backend

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=Decoder!@#123XPrem!um
      - MYSQL_DATABASE=decodx_db
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 10s
      retries: 5
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  db-data:
